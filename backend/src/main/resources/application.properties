spring.application.name=backend
spring.application.name=backend

# Server Configuration
server.port=${SERVER_PORT:8080}

# MongoDB Database Configuration
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/modumakedb}
spring.data.mongodb.database=${MONGO_DB:modumakedb}

# Redis Configuration (OTP & Rate Limiting)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# JWT Security
jwt.secret=${JWT_SECRET:8b16094b43364e96a0d71de2d004b2868b16094b43364e96a0d71de2d004b286}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Google OAuth2 Settings
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:mock-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:mock-client-secret}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

